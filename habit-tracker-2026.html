<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ec;
    --paper: #faf8f4;
    --ink: #2c2820;
    --ink-soft: #7a7267;
    --ink-faint: #b8b0a4;
    --accent: #c17c3e;
    --accent-soft: #e8d5be;
    --done: #4a7c59;
    --done-soft: #d4e8da;
    --line: #e2ddd5;
    --radius: 3px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Lora', Georgia, serif;
    min-height: 100vh;
    padding: 40px 24px 80px;
  }

  /* ── Header ── */
  .header {
    max-width: 820px;
    margin: 0 auto 48px;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 6px;
  }

  h1 {
    font-size: 2rem;
    font-weight: 500;
    letter-spacing: -0.02em;
  }

  .year-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--ink-soft);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 2px 10px;
  }

  .header-sub {
    font-size: 0.88rem;
    color: var(--ink-soft);
    font-style: italic;
  }

  /* ── Month Tabs ── */
  .month-nav {
    max-width: 820px;
    margin: 0 auto 32px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .month-tab {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s ease;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .month-tab:hover { border-color: var(--accent); color: var(--accent); }
  .month-tab.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  /* ── Main card ── */
  .tracker-card {
    max-width: 820px;
    margin: 0 auto;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
  }

  .card-header {
    padding: 24px 28px 18px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .card-month {
    font-size: 1.25rem;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .card-year {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--ink-soft);
  }

  .card-header-right {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }

  /* ── Habits input ── */
  .habits-section {
    padding: 20px 28px 0;
    border-bottom: 1px solid var(--line);
  }

  .habits-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    margin-bottom: 12px;
    display: block;
  }

  .habits-list { display: flex; flex-direction: column; gap: 0; }

  .habit-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px dashed var(--line);
  }

  .habit-row:last-of-type { border-bottom: none; }

  .habit-color {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .habit-name-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Lora', serif;
    font-size: 0.9rem;
    color: var(--ink);
    padding: 2px 0;
  }

  .habit-name-input::placeholder { color: var(--ink-faint); font-style: italic; }

  .habit-delete {
    opacity: 0;
    cursor: pointer;
    color: var(--ink-faint);
    font-size: 1rem;
    transition: opacity 0.15s;
    background: none;
    border: none;
    line-height: 1;
    padding: 0 4px;
  }

  .habit-row:hover .habit-delete { opacity: 1; }

  .add-habit-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--ink-soft);
    font-family: 'Lora', serif;
    font-size: 0.85rem;
    font-style: italic;
    cursor: pointer;
    padding: 10px 0 16px;
    transition: color 0.15s;
  }

  .add-habit-btn:hover { color: var(--accent); }

  /* ── Week grid ── */
  .weeks-section { padding: 0; }

  .week-block {
    border-bottom: 1px solid var(--line);
    overflow: hidden;
    transition: all 0.3s ease;
  }

  .week-block:last-child { border-bottom: none; }

  .week-header {
    display: flex;
    align-items: center;
    padding: 14px 28px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
    gap: 12px;
  }

  .week-header:hover { background: rgba(0,0,0,0.02); }

  .week-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
  }

  .week-dates {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink-faint);
  }

  .week-chevron {
    margin-left: auto;
    color: var(--ink-faint);
    font-size: 0.8rem;
    transition: transform 0.25s ease;
  }

  .week-block.open .week-chevron { transform: rotate(180deg); }

  .week-progress {
    flex: 1;
    height: 2px;
    background: var(--line);
    border-radius: 2px;
    overflow: hidden;
    max-width: 80px;
  }

  .week-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .week-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }

  .week-block.open .week-content { max-height: 600px; }

  /* ── Grid ── */
  .grid-wrap { padding: 0 28px 20px; overflow-x: auto; }

  .grid {
    min-width: 480px;
  }

  .grid-head {
    display: grid;
    margin-bottom: 4px;
  }

  .grid-head-cell {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-faint);
    text-align: center;
    padding: 4px 2px;
  }

  .grid-head-cell.today-col {
    color: var(--accent);
  }

  .grid-row {
    display: grid;
    align-items: center;
    margin-bottom: 3px;
  }

  .grid-habit-name {
    font-size: 0.82rem;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding-right: 12px;
  }

  .grid-habit-name span.dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  .grid-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2px;
  }

  .check-box {
    width: 26px;
    height: 26px;
    border-radius: var(--radius);
    border: 1.5px solid var(--line);
    background: transparent;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .check-box:hover { border-color: var(--accent-soft); background: var(--accent-soft); }

  .check-box.checked {
    background: var(--done-soft);
    border-color: var(--done);
  }

  .check-box.checked::after {
    content: '';
    width: 9px;
    height: 5px;
    border-left: 1.5px solid var(--done);
    border-bottom: 1.5px solid var(--done);
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }

  .check-box.today-cell {
    border-color: var(--accent-soft);
  }

  .check-box.future-cell {
    opacity: 0.35;
    cursor: default;
  }

  .check-box.future-cell:hover {
    border-color: var(--line);
    background: transparent;
  }

  /* ── Stats footer ── */
  .stats-row {
    display: flex;
    gap: 24px;
    padding: 16px 28px;
    border-top: 1px solid var(--line);
    background: var(--bg);
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--ink);
  }

  .stat-label {
    font-size: 0.72rem;
    color: var(--ink-faint);
    font-style: italic;
  }

  /* ── Buttons ── */
  .btn-sm {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-sm:hover { border-color: var(--ink); color: var(--ink); }

  /* ── Empty state ── */
  .empty-state {
    padding: 32px 28px;
    text-align: center;
    color: var(--ink-faint);
    font-style: italic;
    font-size: 0.88rem;
  }

  .divider-line {
    border: none;
    border-top: 1px solid var(--line);
    margin: 0;
  }

  @media (max-width: 600px) {
    body { padding: 24px 16px 60px; }
    .card-header, .habits-section, .grid-wrap, .week-header, .stats-row { padding-left: 18px; padding-right: 18px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>Habit Tracker</h1>
    <span class="year-badge">2026</span>
  </div>
  <p class="header-sub">Seguimiento diario · semana a semana</p>
</div>

<nav class="month-nav" id="monthNav"></nav>

<div class="tracker-card" id="trackerCard">
  <div class="card-header">
    <div>
      <div class="card-month" id="cardMonth"></div>
      <div class="card-year">2026</div>
    </div>
    <div class="card-header-right">
      <button class="btn-sm" onclick="expandAll()">Ver todo</button>
      <button class="btn-sm" onclick="collapseAll()">Colapsar</button>
    </div>
  </div>

  <!-- Habits list -->
  <div class="habits-section">
    <span class="habits-label">Mis hábitos</span>
    <div class="habits-list" id="habitsList"></div>
    <button class="add-habit-btn" onclick="addHabit()">+ añadir hábito</button>
  </div>

  <!-- Weeks -->
  <div class="weeks-section" id="weeksSection"></div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow"></div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────

const MONTHS = [
  { key: 'jun', name: 'Junio',      num: 6 },
  { key: 'jul', name: 'Julio',      num: 7 },
  { key: 'ago', name: 'Agosto',     num: 8 },
  { key: 'sep', name: 'Septiembre', num: 9 },
  { key: 'oct', name: 'Octubre',    num: 10 },
  { key: 'nov', name: 'Noviembre',  num: 11 },
  { key: 'dic', name: 'Diciembre',  num: 12 },
];

const PALETTE = ['#c17c3e','#4a7c59','#6b7fa8','#b05b6f','#7a6ca0','#5b8fa8','#8fa85b'];
const DAY_LABELS = ['L','M','X','J','V','S','D'];

const STORAGE_KEY = 'habitTracker2026';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let data = loadData();
// data structure:
// { habits: [{id, name, color}], checks: { 'YYYY-MM-DD': { habitId: bool } } }

if (!data.habits) data.habits = [
  { id: uid(), name: 'Meditación', color: PALETTE[0] },
  { id: uid(), name: 'Ejercicio',  color: PALETTE[1] },
  { id: uid(), name: 'Lectura',    color: PALETTE[2] },
];
if (!data.checks) data.checks = {};

function uid() { return Math.random().toString(36).slice(2, 9); }

// ── Date helpers ───────────────────────────────────────────────────────────

const TODAY = new Date();
TODAY.setHours(0,0,0,0);

function dateKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function isToday(d) { return d.getTime() === TODAY.getTime(); }
function isPast(d) { return d < TODAY; }
function isFuture(d) { return d > TODAY; }

function getWeeksOfMonth(year, month) {
  // month: 1-12
  const weeks = [];
  const firstDay = new Date(year, month - 1, 1);
  // Start from Monday of the week containing the 1st
  const start = new Date(firstDay);
  const dow = (firstDay.getDay() + 6) % 7; // 0=Mon
  start.setDate(start.getDate() - dow);

  let cur = new Date(start);
  let weekNum = 1;
  while (true) {
    const weekDays = [];
    for (let i = 0; i < 7; i++) {
      weekDays.push(new Date(cur));
      cur.setDate(cur.getDate() + 1);
    }
    // Only include week if it has days in the target month
    const hasInMonth = weekDays.some(d => d.getMonth() === month - 1);
    if (!hasInMonth) break;
    weeks.push({ weekNum, days: weekDays });
    weekNum++;
    if (weekNum > 6) break;
  }
  return weeks;
}

// ── State ──────────────────────────────────────────────────────────────────

let currentMonthIdx = 0; // default June
let openWeeks = {}; // { weekKey: bool }

// Auto-open current week if in current month
function initOpenWeeks(monthObj) {
  openWeeks = {};
  const weeks = getWeeksOfMonth(2026, monthObj.num);
  weeks.forEach((w, i) => {
    const key = monthObj.key + '-w' + i;
    // Open the week if it contains today or is the first future week
    const hasToday = w.days.some(d => isToday(d));
    const hasCurrentOrPast = w.days.some(d => !isFuture(d) && d.getMonth() === monthObj.num - 1);
    if (hasToday || (i === 0)) openWeeks[key] = true;
  });
}

// ── Render ─────────────────────────────────────────────────────────────────

function render() {
  renderMonthNav();
  renderCard();
}

function renderMonthNav() {
  const nav = document.getElementById('monthNav');
  nav.innerHTML = '';
  MONTHS.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'month-tab' + (i === currentMonthIdx ? ' active' : '');
    btn.textContent = m.name;
    btn.onclick = () => { currentMonthIdx = i; initOpenWeeks(MONTHS[i]); render(); };
    nav.appendChild(btn);
  });
}

function renderCard() {
  const m = MONTHS[currentMonthIdx];
  document.getElementById('cardMonth').textContent = m.name;
  renderHabits();
  renderWeeks(m);
  renderStats(m);
}

function renderHabits() {
  const list = document.getElementById('habitsList');
  list.innerHTML = '';
  if (!data.habits.length) {
    list.innerHTML = '<div class="empty-state">Añade tu primer hábito ↓</div>';
    return;
  }
  data.habits.forEach(h => {
    const row = document.createElement('div');
    row.className = 'habit-row';
    row.innerHTML = `
      <div class="habit-color" style="background:${h.color}"></div>
      <input class="habit-name-input" value="${escHtml(h.name)}" placeholder="Nombre del hábito…" data-id="${h.id}">
      <button class="habit-delete" title="Eliminar" data-id="${h.id}">×</button>
    `;
    row.querySelector('input').addEventListener('change', e => {
      const habit = data.habits.find(x => x.id === e.target.dataset.id);
      if (habit) { habit.name = e.target.value; saveData(data); renderWeeks(MONTHS[currentMonthIdx]); }
    });
    row.querySelector('.habit-delete').addEventListener('click', e => {
      const id = e.target.dataset.id;
      data.habits = data.habits.filter(x => x.id !== id);
      saveData(data); render();
    });
    list.appendChild(row);
  });
}

function renderWeeks(monthObj) {
  const section = document.getElementById('weeksSection');
  section.innerHTML = '';
  const weeks = getWeeksOfMonth(2026, monthObj.num);

  weeks.forEach((w, i) => {
    const key = monthObj.key + '-w' + i;
    const isOpen = openWeeks[key];

    // Week date range label
    const daysInMonth = w.days.filter(d => d.getMonth() === monthObj.num - 1);
    const d1 = daysInMonth[0], d2 = daysInMonth[daysInMonth.length - 1];
    const rangeLabel = d1.getDate() + ' – ' + d2.getDate() + ' ' + monthObj.name.slice(0,3).toLowerCase();

    // Progress
    const { pct } = weekStats(w, monthObj.num);

    const block = document.createElement('div');
    block.className = 'week-block' + (isOpen ? ' open' : '');
    block.innerHTML = `
      <div class="week-header">
        <span class="week-label">Semana ${i + 1}</span>
        <span class="week-dates">${rangeLabel}</span>
        <div class="week-progress"><div class="week-progress-fill" style="width:${pct}%"></div></div>
        <span class="week-chevron">▾</span>
      </div>
      <div class="week-content">
        <div class="grid-wrap">
          ${buildGrid(w, monthObj.num)}
        </div>
      </div>
    `;

    block.querySelector('.week-header').addEventListener('click', () => {
      openWeeks[key] = !openWeeks[key];
      render();
    });

    section.appendChild(block);
  });
}

function buildGrid(week, month) {
  if (!data.habits.length) return '<div class="empty-state" style="padding:16px 0">Añade hábitos para comenzar</div>';

  const cols = `180px repeat(7, 1fr)`;

  // Head
  let headHtml = `<div class="grid-head" style="grid-template-columns:${cols}">
    <div></div>`;
  week.days.forEach((d, i) => {
    const inMonth = d.getMonth() === month - 1;
    const todayCls = isToday(d) ? ' today-col' : '';
    const opacity = inMonth ? '' : ' style="opacity:0.3"';
    headHtml += `<div class="grid-head-cell${todayCls}"${opacity}>${DAY_LABELS[i]}<br><span style="font-size:0.6rem;opacity:0.7">${d.getDate()}</span></div>`;
  });
  headHtml += '</div>';

  // Rows
  let rowsHtml = '';
  data.habits.forEach(h => {
    rowsHtml += `<div class="grid-row" style="grid-template-columns:${cols}">
      <div class="grid-habit-name"><span class="dot" style="background:${h.color}"></span>${escHtml(h.name)}</div>`;
    week.days.forEach(d => {
      const key = dateKey(d);
      const inMonth = d.getMonth() === month - 1;
      const checked = data.checks[key] && data.checks[key][h.id];
      const fut = isFuture(d);
      const todayCls = isToday(d) ? ' today-cell' : '';
      const futCls = (fut || !inMonth) ? ' future-cell' : '';
      const chkCls = checked ? ' checked' : '';
      rowsHtml += `<div class="grid-cell">
        <div class="check-box${chkCls}${todayCls}${futCls}" 
             data-date="${key}" data-habit="${h.id}"
             ${(fut || !inMonth) ? '' : 'onclick="toggleCheck(this)"'}>
        </div>
      </div>`;
    });
    rowsHtml += '</div>';
  });

  return `<div class="grid">${headHtml}${rowsHtml}</div>`;
}

function weekStats(week, month) {
  const daysInMonth = week.days.filter(d => d.getMonth() === month - 1 && !isFuture(d));
  const total = daysInMonth.length * data.habits.length;
  if (!total) return { done: 0, total: 0, pct: 0 };
  let done = 0;
  daysInMonth.forEach(d => {
    const key = dateKey(d);
    data.habits.forEach(h => { if (data.checks[key] && data.checks[key][h.id]) done++; });
  });
  return { done, total, pct: Math.round((done / total) * 100) };
}

function renderStats(monthObj) {
  const row = document.getElementById('statsRow');
  // Month-wide stats
  const weeks = getWeeksOfMonth(2026, monthObj.num);
  let totalDone = 0, totalPossible = 0, streak = 0;

  const allDays = [];
  weeks.forEach(w => w.days.filter(d => d.getMonth() === monthObj.num - 1).forEach(d => allDays.push(d)));

  allDays.forEach(d => {
    if (isFuture(d)) return;
    totalPossible += data.habits.length;
    const key = dateKey(d);
    data.habits.forEach(h => { if (data.checks[key] && data.checks[key][h.id]) totalDone++; });
  });

  // streak: consecutive days with all habits done (backwards from today)
  const sortedPast = allDays.filter(d => !isFuture(d)).sort((a,b) => b-a);
  for (let d of sortedPast) {
    const key = dateKey(d);
    const allDone = data.habits.every(h => data.checks[key] && data.checks[key][h.id]);
    if (allDone) streak++; else break;
  }

  const pct = totalPossible ? Math.round((totalDone / totalPossible) * 100) : 0;

  row.innerHTML = `
    <div class="stat-item">
      <span class="stat-value">${totalDone}</span>
      <span class="stat-label">completados</span>
    </div>
    <div class="stat-item">
      <span class="stat-value">${pct}%</span>
      <span class="stat-label">del mes</span>
    </div>
    <div class="stat-item">
      <span class="stat-value">${streak}</span>
      <span class="stat-label">días seguidos</span>
    </div>
    <div class="stat-item">
      <span class="stat-value">${data.habits.length}</span>
      <span class="stat-label">hábitos activos</span>
    </div>
  `;
}

// ── Actions ────────────────────────────────────────────────────────────────

function toggleCheck(el) {
  const dateK = el.dataset.date;
  const habitId = el.dataset.habit;
  if (!data.checks[dateK]) data.checks[dateK] = {};
  data.checks[dateK][habitId] = !data.checks[dateK][habitId];
  saveData(data);
  // Update UI without full re-render
  el.classList.toggle('checked', data.checks[dateK][habitId]);
  renderStats(MONTHS[currentMonthIdx]);
  // Update week progress bar
  renderWeekProgressBars();
}

function renderWeekProgressBars() {
  const m = MONTHS[currentMonthIdx];
  const weeks = getWeeksOfMonth(2026, m.num);
  weeks.forEach((w, i) => {
    const fills = document.querySelectorAll('.week-progress-fill');
    if (fills[i]) {
      const { pct } = weekStats(w, m.num);
      fills[i].style.width = pct + '%';
    }
  });
}

function addHabit() {
  const colorIdx = data.habits.length % PALETTE.length;
  data.habits.push({ id: uid(), name: '', color: PALETTE[colorIdx] });
  saveData(data);
  render();
  // Focus new input
  setTimeout(() => {
    const inputs = document.querySelectorAll('.habit-name-input');
    if (inputs.length) inputs[inputs.length - 1].focus();
  }, 50);
}

function expandAll() {
  const m = MONTHS[currentMonthIdx];
  const weeks = getWeeksOfMonth(2026, m.num);
  weeks.forEach((_, i) => { openWeeks[m.key + '-w' + i] = true; });
  render();
}

function collapseAll() {
  openWeeks = {};
  render();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ───────────────────────────────────────────────────────────────────

// Find current or nearest month
const now = new Date();
if (now.getFullYear() === 2026) {
  const idx = MONTHS.findIndex(m => m.num >= now.getMonth() + 1);
  if (idx >= 0) currentMonthIdx = idx;
}

initOpenWeeks(MONTHS[currentMonthIdx]);
render();
</script>
</body>
</html>
